<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mise à jour</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    background: #f5f5f5;
    color: #222;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    background: #1e88e5;
    color: #fff;
    padding: 10px 16px;
    font-size: 15px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .section {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-bottom: 16px;
    padding: 16px 20px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #eee;
  }
  .version-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 8px;
  }
  .version-label {
    width: 160px;
    flex-shrink: 0;
    color: #333;
  }
  .version-value {
    font-weight: 500;
    color: #111;
  }
  #status-msg {
    font-size: 0.9rem;
    color: #555;
    margin-top: 4px;
    min-height: 1.2em;
  }
  #status-msg.up-to-date { color: #388e3c; font-weight: 500; }
  #status-msg.update-available { color: #1565c0; font-weight: 500; }
  #release-notes-section {
    display: none;
  }
  #release-notes {
    font-size: 12px;
    color: #444;
    white-space: pre-wrap;
    line-height: 1.6;
    max-height: 160px;
    overflow-y: auto;
    background: #f9f9f9;
    border: 1px solid #eee;
    border-radius: 4px;
    padding: 10px 12px;
  }
  #messages-section {
    display: none;
  }
  #messages {
    font-size: 12px;
    color: #444;
    line-height: 1.8;
    max-height: 120px;
    overflow-y: auto;
  }
  #messages li {
    list-style: none;
    padding: 2px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  #messages li:last-child { border-bottom: none; }
  .footer {
    padding: 10px 16px;
    background: #fff;
    border-top: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    flex-shrink: 0;
  }
  #btn-update {
    padding: 7px 20px;
    border: 1px solid #1e88e5;
    border-radius: 4px;
    background: #1e88e5;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  #btn-update:hover:not(:disabled) { background: #1565c0; border-color: #1565c0; }
  #btn-update:disabled { background: #90caf9; border-color: #90caf9; cursor: default; }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #ccc;
    border-top-color: #1e88e5;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>Mise à jour</header>

<div class="content">
  <div class="section">
    <div class="section-title">Version</div>
    <div class="version-row">
      <span class="version-label">Version installée</span>
      <span class="version-value" id="current-version">—</span>
    </div>
    <div class="version-row" id="latest-version-row" style="display:none">
      <span class="version-label">Dernière version</span>
      <span class="version-value" id="latest-version">—</span>
    </div>
    <p id="status-msg"><span class="spinner"></span> Vérification en cours…</p>
  </div>

  <div class="section" id="release-notes-section">
    <div class="section-title">Notes de version</div>
    <pre id="release-notes"></pre>
  </div>

  <div class="section" id="messages-section">
    <div class="section-title">Progression</div>
    <ul id="messages"></ul>
  </div>
</div>

<div class="footer">
  <button id="btn-update" disabled>Mettre à jour</button>
</div>

<script>
(function () {
  var pendingAssetUrl = null;

  function window_msg(jsonStr) {
    var data;
    try { data = JSON.parse(jsonStr); } catch (e) { return; }

    if (data.type === 'check_result') {
      document.getElementById('current-version').textContent = 'v' + data.current;
      var statusEl = document.getElementById('status-msg');

      if (!data.latest) {
        statusEl.textContent = 'Vous avez la dernière version (v' + data.current + ')';
        statusEl.className = 'up-to-date';
      } else {
        document.getElementById('latest-version').textContent = 'v' + data.latest;
        document.getElementById('latest-version-row').style.display = '';
        statusEl.textContent = 'Une nouvelle version est disponible : v' + data.latest;
        statusEl.className = 'update-available';

        if (data.body && data.body.length > 0) {
          document.getElementById('release-notes').textContent = data.body;
          document.getElementById('release-notes-section').style.display = '';
        }

        pendingAssetUrl = data.asset_url;
        document.getElementById('btn-update').disabled = false;
      }
      return;
    }

    if (data.type === 'msg') {
      appendMessage(data.text);
      return;
    }
  }

  function appendMessage(text) {
    var section = document.getElementById('messages-section');
    section.style.display = '';
    var list = document.getElementById('messages');
    var li = document.createElement('li');
    li.textContent = text;
    list.appendChild(li);
    list.scrollTop = list.scrollHeight;
  }

  document.getElementById('btn-update').addEventListener('click', function () {
    if (!pendingAssetUrl) { return; }
    this.disabled = true;
    var payload = JSON.stringify({ action: 'update-confirm', asset_url: pendingAssetUrl });
    if (window.ipc && typeof window.ipc.postMessage === 'function') {
      window.ipc.postMessage(payload);
    }
  });

  // Expose so Rust can call: webview.evaluate_script("window_msg(<json>)")
  window.window_msg = window_msg;
})();
</script>
</body>
</html>
