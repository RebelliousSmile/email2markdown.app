<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    background: #f5f5f5;
    color: #222;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    background: #1e88e5;
    color: #fff;
    padding: 10px 16px;
    font-size: 15px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .section {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-bottom: 16px;
    padding: 16px 20px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #eee;
  }
  .field {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }
  .field:last-child { margin-bottom: 0; }
  .field label {
    width: 220px;
    flex-shrink: 0;
    color: #333;
  }
  .field input[type="text"] {
    flex: 1;
    padding: 5px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    background: #fff;
  }
  .field input[type="text"]:focus {
    outline: none;
    border-color: #1e88e5;
    box-shadow: 0 0 0 2px rgba(30,136,229,0.15);
  }
  .field input[type="number"] {
    width: 80px;
    padding: 5px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    background: #fff;
  }
  .field input[type="number"]:focus {
    outline: none;
    border-color: #1e88e5;
    box-shadow: 0 0 0 2px rgba(30,136,229,0.15);
  }
  .field input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  .field-hint {
    font-size: 11px;
    color: #888;
    margin-left: 8px;
  }
  .error-msg {
    display: none;
    color: #d32f2f;
    font-size: 12px;
    margin-top: 4px;
    margin-left: 220px;
  }
  .footer {
    padding: 10px 16px;
    background: #fff;
    border-top: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    flex-shrink: 0;
  }
  #btn-open-raw {
    background: none;
    border: none;
    color: #1e88e5;
    cursor: pointer;
    font-size: 13px;
    padding: 0;
    text-decoration: underline;
  }
  #btn-open-raw:hover { color: #1565c0; }
  #btn-save {
    padding: 7px 20px;
    border: 1px solid #1e88e5;
    border-radius: 4px;
    background: #1e88e5;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  #btn-save:hover { background: #1565c0; border-color: #1565c0; }
  #btn-save:disabled { background: #90caf9; border-color: #90caf9; cursor: default; }
</style>
</head>
<body>
<script>window.__SETTINGS_DATA__ = __SETTINGS_JSON__;</script>

<header>Paramètres</header>

<div class="content">
  <div class="section">
    <div class="section-title">Exportation</div>
    <div class="field">
      <label for="export-base-dir">Dossier de destination</label>
      <input type="text" id="export-base-dir" placeholder="Chemin vers le dossier d'export (vide = non défini)">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Comportement par défaut</div>
    <div class="field">
      <label for="quote-depth">Profondeur des citations</label>
      <input type="number" id="quote-depth" min="0" step="1" value="1">
      <span class="field-hint">Entier ≥ 0</span>
    </div>
    <div id="quote-depth-error" class="error-msg">La profondeur doit être un entier ≥ 0.</div>
    <div class="field">
      <label for="skip-existing">Ne pas ré-exporter les emails existants</label>
      <input type="checkbox" id="skip-existing">
    </div>
    <div class="field">
      <label for="collect-contacts">Collecter les contacts</label>
      <input type="checkbox" id="collect-contacts">
    </div>
    <div class="field">
      <label for="skip-signature-images">Ignorer les images de signature</label>
      <input type="checkbox" id="skip-signature-images">
    </div>
    <div class="field">
      <label for="delete-after-export">Supprimer après exportation</label>
      <input type="checkbox" id="delete-after-export">
    </div>
    <div class="field">
      <label for="cleanup-empty-dirs">Nettoyer les dossiers vides</label>
      <input type="checkbox" id="cleanup-empty-dirs">
    </div>
    <div class="field">
      <label for="organize-by-type">Organiser par type</label>
      <input type="checkbox" id="organize-by-type">
    </div>
  </div>
</div>

<div class="footer">
  <button id="btn-open-raw">Ouvrir le fichier brut</button>
  <button id="btn-save">Sauvegarder</button>
</div>

<script>
(function () {
  var data = window.__SETTINGS_DATA__ || {};
  var defaults = data.defaults || {};

  // Populate fields
  document.getElementById('export-base-dir').value =
    (data.export_base_dir !== undefined && data.export_base_dir !== null)
      ? data.export_base_dir
      : '';

  document.getElementById('quote-depth').value =
    defaults.quote_depth !== undefined ? defaults.quote_depth : 1;

  document.getElementById('skip-existing').checked =
    defaults.skip_existing !== undefined ? defaults.skip_existing : true;

  document.getElementById('collect-contacts').checked =
    defaults.collect_contacts !== undefined ? defaults.collect_contacts : false;

  document.getElementById('skip-signature-images').checked =
    defaults.skip_signature_images !== undefined ? defaults.skip_signature_images : true;

  document.getElementById('delete-after-export').checked =
    defaults.delete_after_export !== undefined ? defaults.delete_after_export : false;

  document.getElementById('cleanup-empty-dirs').checked =
    defaults.cleanup_empty_dirs !== undefined ? defaults.cleanup_empty_dirs : false;

  document.getElementById('organize-by-type').checked =
    defaults.organize_by_type !== undefined ? defaults.organize_by_type : false;

  // Save
  document.getElementById('btn-save').addEventListener('click', function () {
    var errorEl = document.getElementById('quote-depth-error');
    var quoteDepthInput = document.getElementById('quote-depth');
    var quoteDepthVal = quoteDepthInput.value.trim();
    var quoteDepth = parseInt(quoteDepthVal, 10);

    // Validate: must be a non-negative integer
    if (quoteDepthVal === '' || isNaN(quoteDepth) || quoteDepth < 0 || String(quoteDepth) !== quoteDepthVal) {
      errorEl.style.display = 'block';
      quoteDepthInput.focus();
      return;
    }
    errorEl.style.display = 'none';

    var exportDir = document.getElementById('export-base-dir').value.replace(/^\s+|\s+$/g, '');

    var payload = {
      action: 'save',
      data: {
        export_base_dir: exportDir.length > 0 ? exportDir : null,
        defaults: {
          quote_depth: quoteDepth,
          skip_existing: document.getElementById('skip-existing').checked,
          collect_contacts: document.getElementById('collect-contacts').checked,
          skip_signature_images: document.getElementById('skip-signature-images').checked,
          delete_after_export: document.getElementById('delete-after-export').checked,
          cleanup_empty_dirs: document.getElementById('cleanup-empty-dirs').checked,
          organize_by_type: document.getElementById('organize-by-type').checked
        }
      }
    };

    var msg = JSON.stringify(payload);
    document.getElementById('btn-save').disabled = true;
    if (window.ipc && typeof window.ipc.postMessage === 'function') {
      window.ipc.postMessage(msg);
    }
  });

  // Open raw
  document.getElementById('btn-open-raw').addEventListener('click', function () {
    var msg = JSON.stringify({ action: 'open_raw' });
    if (window.ipc && typeof window.ipc.postMessage === 'function') {
      window.ipc.postMessage(msg);
    }
  });
})();
</script>
</body>
</html>
