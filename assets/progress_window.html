<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>En cours</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #222;
    padding: 28px 32px;
    width: 500px;
  }

  h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: #111;
  }

  #status {
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 12px;
    min-height: 1.2em;
  }

  #bar {
    width: 100%;
    height: 8px;
    background: #ddd;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  #fill {
    height: 100%;
    width: 0%;
    background: #3b82f6;
    border-radius: 4px;
    transition: width 0.25s ease;
  }

  #fill.pulse {
    width: 40%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  #last-status {
    font-size: 0.78rem;
    color: #999;
    margin-bottom: 12px;
    min-height: 1.1em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #summary {
    display: none;
    font-size: 0.9rem;
    color: #333;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  #summary.error-text {
    color: #dc2626;
  }

  #close {
    display: none;
    padding: 7px 20px;
    font-size: 0.9rem;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  #close:hover { background: #2563eb; }

  #cancel {
    padding: 7px 20px;
    font-size: 0.9rem;
    background: transparent;
    color: #555;
    border: 1px solid #bbb;
    border-radius: 5px;
    cursor: pointer;
    margin-right: 8px;
  }

  #cancel:hover { background: #eee; }

  .warning-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fff8e1;
    border: 1px solid #f59e0b;
    color: #92400e;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.8rem;
    font-weight: 500;
    margin-bottom: 14px;
  }
</style>
</head>
<body>
  <h2 id="title">__ACTION_NAME__</h2>
  __WARNING__
  <p id="status">Démarrage…</p>
  <div id="bar"><div id="fill"></div></div>
  <p id="last-status">Récupération des en-têtes…</p>
  <p id="summary"></p>
  <button id="action-btn" hidden style="background:#1e88e5;color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-size:14px;margin-right:8px;"></button>
  __HAS_CANCEL__
  <button id="close" onclick="window.ipc.postMessage('close')">Fermer</button>

<script>
  function step(current, total, message) {
    var pct = total > 0 ? Math.round(current / total * 100) : 0;
    document.getElementById("fill").style.width = pct + "%";
    document.getElementById("fill").classList.remove("pulse");
    document.getElementById("status").textContent = message;
  }

  function indeterminate(message) {
    document.getElementById("fill").classList.add("pulse");
    document.getElementById("status").textContent = message;
  }

  function statusLine(text) {
    document.getElementById("last-status").textContent = text;
  }

  function finish(summary) {
    document.getElementById("bar").style.display = "none";
    document.getElementById("status").style.display = "none";
    document.getElementById("last-status").style.display = "none";
    var el = document.getElementById("summary");
    el.textContent = summary;
    el.style.display = "block";
    var c = document.getElementById("cancel"); if (c) c.style.display = "none";
    document.getElementById("close").style.display = "inline-block";
  }

  function error(message, actionLabel) {
    document.getElementById("bar").style.display = "none";
    document.getElementById("status").style.display = "none";
    document.getElementById("last-status").style.display = "none";
    var el = document.getElementById("summary");
    el.textContent = message;
    el.classList.add("error-text");
    el.style.display = "block";
    var c = document.getElementById("cancel"); if (c) c.style.display = "none";
    document.getElementById("close").style.display = "inline-block";
    var actionBtn = document.getElementById("action-btn");
    if (actionLabel) {
      actionBtn.textContent = actionLabel;
      actionBtn.hidden = false;
      actionBtn.onclick = function() { window.ipc.postMessage("action"); };
    }
  }
</script>
</body>
</html>
