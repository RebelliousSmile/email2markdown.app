<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révision du tri</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    background: #f5f5f5;
    color: #222;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    background: #1e88e5;
    color: #fff;
    padding: 10px 16px;
    font-size: 15px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    flex-shrink: 0;
  }
  .toolbar label { display: flex; align-items: center; gap: 4px; }
  .toolbar select, .toolbar button {
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
  }
  .toolbar button { background: #1e88e5; color: #fff; border-color: #1e88e5; }
  .toolbar button:hover { background: #1565c0; }
  .table-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #eee;
    font-weight: 600;
    padding: 7px 10px;
    text-align: left;
    border-bottom: 1px solid #ccc;
    white-space: nowrap;
    z-index: 1;
  }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr:hover { background: #e3f2fd; }
  tbody td {
    padding: 5px 10px;
    border-bottom: 1px solid #eee;
    vertical-align: middle;
  }
  tbody td.subject { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tbody td.sender { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  select.decision {
    padding: 2px 4px;
    border: 1px solid #ccc;
    border-radius: 3px;
    font-size: 12px;
    background: #fff;
  }
  select.decision[data-val="delete"]    { background: #ffeaea; border-color: #f44336; }
  select.decision[data-val="summarize"] { background: #fff8e1; border-color: #ff9800; }
  select.decision[data-val="keep"]      { background: #e8f5e9; border-color: #4caf50; }
  .footer {
    padding: 10px 16px;
    background: #fff;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }
  .footer button {
    padding: 7px 20px;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  #btn-apply {
    background: #4caf50;
    color: #fff;
    border-color: #4caf50;
  }
  #btn-apply:hover { background: #388e3c; }
  #btn-cancel { background: #fff; }
  #btn-cancel:hover { background: #eee; }
  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
  }
  .badge-delete    { background: #f44336; }
  .badge-summarize { background: #ff9800; }
  .badge-keep      { background: #4caf50; }
</style>
</head>
<body>

<header id="page-title">Révision du tri</header>

<div class="toolbar">
  <label>
    <input type="checkbox" id="select-all"> Tout sélectionner
  </label>
  <select id="bulk-decision">
    <option value="">— Décision en masse —</option>
    <option value="delete">Supprimer</option>
    <option value="summarize">Résumer</option>
    <option value="keep">Conserver</option>
  </select>
  <button id="btn-bulk">Appliquer aux sélectionnés</button>
  <span style="margin-left:auto; color:#666;" id="summary-badge"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="header-check"></th>
        <th>Expéditeur</th>
        <th>Sujet</th>
        <th>Date</th>
        <th>Score</th>
        <th>Type</th>
        <th>Décision</th>
      </tr>
    </thead>
    <tbody id="email-table-body"></tbody>
  </table>
</div>

<div class="footer">
  <button id="btn-cancel">Annuler</button>
  <button id="btn-apply">Appliquer</button>
</div>

<script>
(function () {
  var data = window.__REPORT_DATA__ || {};

  // Flatten all categories into rows
  var rows = [];
  var categoryNames = Object.keys(data);
  categoryNames.forEach(function (cat) {
    var emails = data[cat] || [];
    emails.forEach(function (email) {
      rows.push({
        file: email.file,
        subject: email.subject || '',
        sender: email.sender || '',
        date: email.date || '',
        score: email.score != null ? email.score : '',
        email_type: email.type || email.email_type || '',
        decision: cat
      });
    });
  });

  // Sort: delete first, then summarize, then keep
  var order = { delete: 0, summarize: 1, keep: 2 };
  rows.sort(function (a, b) {
    return (order[a.decision] || 99) - (order[b.decision] || 99);
  });

  var tbody = document.getElementById('email-table-body');

  function updateSelectStyle(sel) {
    sel.dataset.val = sel.value;
  }

  function updateSummary() {
    var counts = { delete: 0, summarize: 0, keep: 0 };
    document.querySelectorAll('select.decision').forEach(function (s) {
      counts[s.value] = (counts[s.value] || 0) + 1;
    });
    document.getElementById('summary-badge').innerHTML =
      '<span class="badge badge-delete">' + (counts.delete || 0) + ' suppr.</span> ' +
      '<span class="badge badge-summarize">' + (counts.summarize || 0) + ' résumés</span> ' +
      '<span class="badge badge-keep">' + (counts.keep || 0) + ' conservés</span>';
  }

  function buildTable() {
    tbody.innerHTML = '';
    rows.forEach(function (row, i) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><input type="checkbox" class="row-check" data-i="' + i + '"></td>' +
        '<td class="sender" title="' + esc(row.sender) + '">' + esc(row.sender) + '</td>' +
        '<td class="subject" title="' + esc(row.subject) + '">' + esc(row.subject) + '</td>' +
        '<td>' + esc(row.date) + '</td>' +
        '<td style="text-align:center">' + row.score + '</td>' +
        '<td>' + esc(row.email_type) + '</td>' +
        '<td><select class="decision" data-i="' + i + '">' +
          opt('delete',    'Supprimer',  row.decision) +
          opt('summarize', 'Résumer',    row.decision) +
          opt('keep',      'Conserver',  row.decision) +
        '</select></td>';
      tbody.appendChild(tr);
    });

    document.querySelectorAll('select.decision').forEach(function (sel) {
      updateSelectStyle(sel);
      sel.addEventListener('change', function () {
        rows[parseInt(this.dataset.i)].decision = this.value;
        updateSelectStyle(this);
        updateSummary();
      });
    });

    updateSummary();
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function opt(value, label, selected) {
    return '<option value="' + value + '"' + (selected === value ? ' selected' : '') + '>' + label + '</option>';
  }

  buildTable();

  // Select all (header checkbox)
  document.getElementById('header-check').addEventListener('change', function () {
    var checked = this.checked;
    document.querySelectorAll('.row-check').forEach(function (cb) { cb.checked = checked; });
    document.getElementById('select-all').checked = checked;
  });

  document.getElementById('select-all').addEventListener('change', function () {
    var checked = this.checked;
    document.querySelectorAll('.row-check').forEach(function (cb) { cb.checked = checked; });
    document.getElementById('header-check').checked = checked;
  });

  // Bulk apply
  document.getElementById('btn-bulk').addEventListener('click', function () {
    var decision = document.getElementById('bulk-decision').value;
    if (!decision) { alert('Choisissez une décision en masse d\'abord.'); return; }
    document.querySelectorAll('.row-check:checked').forEach(function (cb) {
      var i = parseInt(cb.dataset.i);
      rows[i].decision = decision;
      var sel = document.querySelector('select.decision[data-i="' + i + '"]');
      if (sel) { sel.value = decision; updateSelectStyle(sel); }
    });
    updateSummary();
  });

  // Cancel
  document.getElementById('btn-cancel').addEventListener('click', function () {
    window.close();
  });

  // Apply
  document.getElementById('btn-apply').addEventListener('click', function () {
    var decisions = rows.map(function (r) {
      return { file: r.file, action: r.decision };
    });
    var msg = JSON.stringify({ decisions: decisions });
    if (window.ipc && typeof window.ipc.postMessage === 'function') {
      window.ipc.postMessage(msg);
    } else {
      alert('IPC non disponible.');
    }
  });
})();
</script>
</body>
</html>
