<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révision du tri</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    background: #f5f5f5;
    color: #222;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    background: #1e88e5;
    color: #fff;
    padding: 10px 16px;
    font-size: 15px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .toolbar label { display: flex; align-items: center; gap: 4px; }
  .toolbar select, .toolbar button, .toolbar input[type="text"] {
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
  }
  .toolbar input[type="text"] { cursor: text; min-width: 200px; }
  .toolbar button { background: #1e88e5; color: #fff; border-color: #1e88e5; }
  .toolbar button:hover { background: #1565c0; }
  .table-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #eee;
    font-weight: 600;
    padding: 7px 10px;
    text-align: left;
    border-bottom: 1px solid #ccc;
    white-space: nowrap;
    z-index: 1;
  }
  thead th[data-col] {
    cursor: pointer;
    user-select: none;
  }
  thead th[data-col]:hover { background: #e0e0e0; }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr:hover { background: #e3f2fd; }
  tbody td {
    padding: 5px 10px;
    border-bottom: 1px solid #eee;
    vertical-align: middle;
  }
  tbody td.subject { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tbody td.sender { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tbody td.dest { min-width: 240px; }
  tbody td.dest input.dest-input {
    width: 100%;
    padding: 3px 6px;
    border: 1px solid #ccc;
    border-radius: 3px;
    font-size: 12px;
    background: #fff;
  }
  tbody td.dest input.dest-input:disabled { background: #f0f0f0; color: #999; }
  select.decision {
    padding: 2px 4px;
    border: 1px solid #ccc;
    border-radius: 3px;
    font-size: 12px;
    background: #fff;
  }
  select.decision[data-val="delete"]    { background: #ffeaea; border-color: #f44336; }
  select.decision[data-val="summarize"] { background: #fff8e1; border-color: #ff9800; }
  select.decision[data-val="keep"]      { background: #e8f5e9; border-color: #4caf50; }
  .footer {
    padding: 10px 16px;
    background: #fff;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }
  .footer button {
    padding: 7px 20px;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  #btn-apply {
    background: #4caf50;
    color: #fff;
    border-color: #4caf50;
  }
  #btn-apply:hover { background: #388e3c; }
  #btn-cancel { background: #fff; }
  #btn-cancel:hover { background: #eee; }
  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
  }
  .badge-delete    { background: #f44336; }
  .badge-summarize { background: #ff9800; }
  .badge-keep      { background: #4caf50; }
  .method-badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    vertical-align: middle;
  }
  .method-ml      { background: #2e7d32; }
  .method-ollama  { background: #6a1b9a; }
  .method-error   { background: #c62828; }
  .method-pending { background: #9e9e9e; }
</style>
</head>
<body>
<script>
  window.__REPORT_DATA__ = __REPORT_JSON__;
  window.__KNOWN_CLASSES__ = __KNOWN_CLASSES_JSON__;
  window.__NOTES_ENABLED__ = __NOTES_ENABLED__;
</script>

<header id="page-title">Révision du tri</header>

<div class="toolbar">
  <label>
    <input type="checkbox" id="select-all"> Tout sélectionner
  </label>
  <select id="bulk-decision">
    <option value="">— Décision en masse —</option>
    <option value="delete">Supprimer</option>
    <option value="summarize">Résumer</option>
    <option value="keep">Conserver</option>
  </select>
  <button id="btn-bulk">Appliquer décision</button>
  <input type="text" id="bulk-dest" list="known-classes" placeholder="Destination (Niv1/Niv2/Niv3)">
  <button id="btn-bulk-dest">Assigner destination</button>
  <span style="margin-left:auto; color:#666;" id="summary-badge"></span>
</div>

<datalist id="known-classes"></datalist>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="header-check"></th>
        <th data-col="sender">Expéditeur</th>
        <th data-col="subject">Sujet</th>
        <th data-col="date">Date</th>
        <th data-col="score">Score</th>
        <th data-col="email_type">Type</th>
        <th data-col="decision">Décision</th>
        <th data-col="notes_destination">Destination notes</th>
      </tr>
    </thead>
    <tbody id="email-table-body"></tbody>
  </table>
</div>

<div class="footer">
  <button id="btn-cancel">Annuler</button>
  <button id="btn-apply">Appliquer</button>
</div>

<script>
(function () {
  var data = window.__REPORT_DATA__ || {};
  var knownClasses = Array.isArray(window.__KNOWN_CLASSES__) ? window.__KNOWN_CLASSES__ : [];
  var notesEnabled = window.__NOTES_ENABLED__ === true;
  if (!notesEnabled) {
    // Hide bulk-dest input/button and the destination column when notes_dir is not configured.
    var bulkDest = document.getElementById('bulk-dest');
    if (bulkDest) bulkDest.style.display = 'none';
    var bulkBtn = document.getElementById('btn-bulk-dest');
    if (bulkBtn) bulkBtn.style.display = 'none';
    document.querySelectorAll('[data-col="notes_destination"]').forEach(function (th) {
      th.style.display = 'none';
    });
  }

  // Populate datalist for autocomplete
  var datalist = document.getElementById('known-classes');
  knownClasses.forEach(function (cls) {
    var opt = document.createElement('option');
    opt.value = cls;
    datalist.appendChild(opt);
  });

  // Flatten all categories into rows
  var rows = [];
  var byFile = {};
  Object.keys(data).forEach(function (cat) {
    var emails = data[cat] || [];
    emails.forEach(function (email) {
      var row = {
        file: email.file,
        subject: email.subject || '',
        sender: email.sender || '',
        date: email.date || '',
        score: email.score != null ? email.score : '',
        email_type: email.type || email.email_type || '',
        decision: cat,
        notes_destination: email.notes_destination || '',
        classify_method: email.classify_method || '',
        classify_confidence: email.classify_confidence != null ? email.classify_confidence : null,
        checked: false
      };
      rows.push(row);
      byFile[row.file] = row;
    });
  });

  // Sort: delete first, then summarize, then keep
  var order = { delete: 0, summarize: 1, keep: 2 };
  rows.sort(function (a, b) {
    return (order[a.decision] || 99) - (order[b.decision] || 99);
  });

  // Column sort state
  var sortCol = null;
  var sortDir = 'asc';

  var colLabels = {
    sender: 'Expéditeur',
    subject: 'Sujet',
    date: 'Date',
    score: 'Score',
    email_type: 'Type',
    decision: 'Décision',
    notes_destination: 'Destination notes'
  };

  function sortRows() {
    rows.sort(function (a, b) {
      var av = a[sortCol], bv = b[sortCol];
      var cmp;
      if (sortCol === 'score') {
        cmp = Number(av) - Number(bv);
      } else {
        cmp = String(av).localeCompare(String(bv), undefined, { sensitivity: 'base' });
      }
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }

  function updateSortIndicators() {
    document.querySelectorAll('thead th[data-col]').forEach(function (th) {
      var col = th.dataset.col;
      th.textContent = colLabels[col] + (col === sortCol ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '');
    });
  }

  var tbody = document.getElementById('email-table-body');

  function updateSelectStyle(sel) {
    sel.dataset.val = sel.value;
  }

  function methodBadgeHtml(method, conf) {
    if (!method) { return ''; }
    var cls = 'method-pending';
    var txt = method;
    if (method === 'ml') { cls = 'method-ml'; txt = 'ML'; }
    else if (method === 'ollama') { cls = 'method-ollama'; txt = 'Ollama'; }
    else if (method === 'error') { cls = 'method-error'; txt = 'Erreur'; }
    var confTxt = (conf != null && conf > 0) ? (' ' + Math.round(conf * 100) + '%') : '';
    return '<span class="method-badge ' + cls + '">' + txt + confTxt + '</span>';
  }

  function updateSummary() {
    var counts = { delete: 0, summarize: 0, keep: 0 };
    document.querySelectorAll('select.decision').forEach(function (s) {
      counts[s.value] = (counts[s.value] || 0) + 1;
    });
    document.getElementById('summary-badge').innerHTML =
      '<span class="badge badge-delete">' + (counts.delete || 0) + ' suppr.</span> ' +
      '<span class="badge badge-summarize">' + (counts.summarize || 0) + ' résumés</span> ' +
      '<span class="badge badge-keep">' + (counts.keep || 0) + ' conservés</span>';
  }

  function buildTable() {
    tbody.innerHTML = '';
    rows.forEach(function (row, i) {
      var tr = document.createElement('tr');
      tr.dataset.file = row.file;
      var destDisabled = (row.decision !== 'summarize') ? ' disabled' : '';
      tr.innerHTML =
        '<td><input type="checkbox" class="row-check" data-i="' + i + '"' + (row.checked ? ' checked' : '') + '></td>' +
        '<td class="sender" title="' + esc(row.sender) + '">' + esc(row.sender) + '</td>' +
        '<td class="subject" title="' + esc(row.subject) + '">' + esc(row.subject) + '</td>' +
        '<td>' + esc(row.date) + '</td>' +
        '<td style="text-align:center">' + row.score + '</td>' +
        '<td>' + esc(row.email_type) + '</td>' +
        '<td><select class="decision" data-i="' + i + '">' +
          opt('delete',    'Supprimer',  row.decision) +
          opt('summarize', 'Résumer',    row.decision) +
          opt('keep',      'Conserver',  row.decision) +
        '</select></td>' +
        '<td class="dest">' +
          '<input type="text" class="dest-input" list="known-classes" data-i="' + i + '" value="' + esc(row.notes_destination) + '"' + destDisabled + ' placeholder="Niv1/Niv2/Niv3">' +
          '<span class="method-slot">' + methodBadgeHtml(row.classify_method, row.classify_confidence) + '</span>' +
        '</td>';
      tbody.appendChild(tr);
    });

    document.querySelectorAll('select.decision').forEach(function (sel) {
      updateSelectStyle(sel);
      sel.addEventListener('change', function () {
        var i = parseInt(this.dataset.i);
        rows[i].decision = this.value;
        updateSelectStyle(this);
        // Toggle the destination input on the same row.
        var destInput = this.closest('tr').querySelector('.dest-input');
        if (destInput) {
          destInput.disabled = (this.value !== 'summarize');
        }
        updateSummary();
      });
    });

    document.querySelectorAll('input.dest-input').forEach(function (inp) {
      inp.addEventListener('input', function () {
        rows[parseInt(this.dataset.i)].notes_destination = this.value;
      });
    });

    document.querySelectorAll('.row-check').forEach(function (cb) {
      cb.addEventListener('change', function () {
        rows[parseInt(this.dataset.i)].checked = this.checked;
        var allChecked = rows.every(function (r) { return r.checked; });
        document.getElementById('header-check').checked = allChecked;
        document.getElementById('select-all').checked = allChecked;
      });
    });

    updateSummary();
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function opt(value, label, selected) {
    return '<option value="' + value + '"' + (selected === value ? ' selected' : '') + '>' + label + '</option>';
  }

  buildTable();

  // Streaming endpoint — called from Rust via WebView.evaluate_script as
  // each classify result arrives.
  window.notesDestUpdate = function (file, path, method, confidence) {
    var row = byFile[file];
    if (!row) { return; }
    // Only overwrite if the user has not typed something already
    if (!row.notes_destination) {
      row.notes_destination = path;
    }
    row.classify_method = method;
    row.classify_confidence = confidence;
    var tr = tbody.querySelector('tr[data-file="' + safeCssEscape(file) + '"]');
    if (!tr) { return; }
    var inp = tr.querySelector('.dest-input');
    if (inp && !inp.value) { inp.value = path; }
    var slot = tr.querySelector('.method-slot');
    if (slot) { slot.innerHTML = methodBadgeHtml(method, confidence); }
  };

  // Use CSS.escape (native, RFC-compliant) when available; fall back to a minimal
  // backslash-escaping shim for older WebViews. Real selector escaping covers many
  // more characters than just `"` and `\`.
  function safeCssEscape(s) {
    if (typeof CSS !== 'undefined' && typeof CSS.escape === 'function') {
      return CSS.escape(String(s));
    }
    return String(s).replace(/(["\\])/g, '\\$1');
  }

  // Select all (header checkbox)
  document.getElementById('header-check').addEventListener('change', function () {
    var checked = this.checked;
    rows.forEach(function (r) { r.checked = checked; });
    document.querySelectorAll('.row-check').forEach(function (cb) { cb.checked = checked; });
    document.getElementById('select-all').checked = checked;
  });

  document.getElementById('select-all').addEventListener('change', function () {
    var checked = this.checked;
    rows.forEach(function (r) { r.checked = checked; });
    document.querySelectorAll('.row-check').forEach(function (cb) { cb.checked = checked; });
    document.getElementById('header-check').checked = checked;
  });

  // Column sort
  document.querySelectorAll('thead th[data-col]').forEach(function (th) {
    th.addEventListener('click', function () {
      var col = this.dataset.col;
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = 'asc';
      }
      sortRows();
      buildTable();
      updateSortIndicators();
    });
  });

  // Bulk apply decision
  document.getElementById('btn-bulk').addEventListener('click', function () {
    var decision = document.getElementById('bulk-decision').value;
    if (!decision) { alert('Choisissez une décision en masse d\'abord.'); return; }
    document.querySelectorAll('.row-check:checked').forEach(function (cb) {
      var i = parseInt(cb.dataset.i);
      rows[i].decision = decision;
      var sel = document.querySelector('select.decision[data-i="' + i + '"]');
      if (sel) { sel.value = decision; updateSelectStyle(sel); }
      var destInp = document.querySelector('input.dest-input[data-i="' + i + '"]');
      if (destInp) { destInp.disabled = (decision !== 'summarize'); }
    });
    updateSummary();
  });

  // Bulk assign destination
  document.getElementById('btn-bulk-dest').addEventListener('click', function () {
    var dest = document.getElementById('bulk-dest').value.trim();
    if (!dest) { alert('Saisissez une destination d\'abord.'); return; }
    document.querySelectorAll('.row-check:checked').forEach(function (cb) {
      var i = parseInt(cb.dataset.i);
      rows[i].notes_destination = dest;
      var inp = document.querySelector('input.dest-input[data-i="' + i + '"]');
      if (inp) { inp.value = dest; }
    });
  });

  // Cancel
  document.getElementById('btn-cancel').addEventListener('click', function () {
    if (window.ipc && typeof window.ipc.postMessage === 'function') {
      window.ipc.postMessage('cancel');
    }
  });

  // Apply
  document.getElementById('btn-apply').addEventListener('click', function () {
    var decisions = rows.map(function (r) {
      var d = { file: r.file, action: r.decision };
      if (r.decision === 'summarize' && r.notes_destination) {
        d.notes_destination = r.notes_destination;
      }
      return d;
    });
    var msg = JSON.stringify({ decisions: decisions });
    if (window.ipc && typeof window.ipc.postMessage === 'function') {
      window.ipc.postMessage(msg);
    } else {
      alert('IPC non disponible.');
    }
  });
})();
</script>
</body>
</html>
